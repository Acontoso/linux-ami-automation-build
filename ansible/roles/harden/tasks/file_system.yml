- name: Ensure /dev/shm is configured remount
  command: mount -o remount,noexec,nodev,nosuid /dev/shm

- name: Remove unneeded filesystem types
  lineinfile:
    create: yes
    path: /etc/modprobe.d/{{ item }}.conf
    state: present
    line: install {{ item }} /bin/true
  loop:
    - cramfs
    - freevxfs
    - jffs2
    - hfs
    - hfsplus
    - squashfs
    - udf
    - FAT

- name: Remove unneeded filesystem types modprobe
  command: modprobe -r {{ item }}
  loop:
    - cramfs
    - freevxfs
    - jffs2
    - hfs
    - hfsplus
    - squashfs
    - udf
    - FAT

- name: Ensure permissions on bootloader config are configured Ubuntu
  ansible.builtin.file:
    path: /etc/default/grub
    mode: og-rwx

- name: Ensure password reuse is limited
  lineinfile:
    state: present
    path: /etc/pam.d/common-password
    line: password required pam_pwhistory.so remember=5

- name: Ensure /tmp is configured
  lineinfile:
    regexp: ^tmpfs\s\/tmp
    state: present
    path: /etc/fstab
    line: tmpfs /tmp tmpfs defaults,rw,nosuid,nodev,noexec,relatime 0 0

- name: Ensure /tmp is configured remount
  command: mount -o remount,noexec,nodev,nosuid /tmp

- name: Ensure nodev option set on /home partition
  command: mount -o remount,nodev /home

- name: Ensure permissions on bootloader config are configured
  ansible.builtin.file:
    path: /boot/grub2/grub.cfg
    mode: og-rwx
