- name: Ensure noexec option set on /dev/shm partition - stop executing binaries or executable code in shared memory
  lineinfile:
    regexp: \s/dev/shm\s
    state: present
    path: /etc/fstab
    line: tmpfs /dev/shm tmpfs defaults,noexec,nodev,nosuid,size=2G 0 0

